<!DOCTYPE html>
<html>
<head>
    <title>하와이 여행 계획</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <span id="EmphasizeHawaii">하와이 여행</span>
        <div style="height: 30px;"></div>
        <button>DAY 1 <span>7월 3일</span></button>
        <button>DAY 2 <span>7월 4일</span></button>
        <button>DAY 3 <span>7월 5일</span></button>
        <button>DAY 4 <span>7월 6일</span></button>
        <button>DAY 5 <span>7월 7일</span></button>
        <button>DAY 6 <span>7월 8일</span></button>
    </div>
    
    <div id="day1" class="daycontainer">
        <p class="daycount redtext anim" style="--dl: 0;">DAY 1</p>
    
        <div class="anim" style="--dl: 1;">
            <div class="schedulecard">
                <span class="redtext">21:00 ~ 11:00</span>
                <p>하와이 도착해서 비행기 내리기</p>
            </div>
        </div>

        <div class="line-container anim" style="--dl: 2;">
            <div class="vertical-line-dotted"></div>
            <p style="color: rgba(210, 15, 57, 0.7)">W Line 버스 타고 이동<br>얼리체크인 되면 하기<br>안되면 짐만 맡기기</p>
        </div>

        <div class="anim" style="--dl: 3;">
            <div class="schedulecard">
                <span class="redtext">와이키키 쇼핑 플라자</span>
                <p>트롤리 바우처 교환, 월마트</p>
            </div>
        </div>

        <div class="anim" style="--dl: 4;">
            <div class="schedulecard">
                <span class="redtext">어디서먹을지 정해야함</span>
                <p>저녁 먹기</p>
            </div>
        </div>

        <div class="anim" style="--dl: 5;">
            <div class="schedulecard">
                <span class="redtext">힐튼 호텔</span>
                <p>불꽃놀이 보기</p>
            </div>
        </div>
    </div>

    <div id="day2" class="daycontainer">
        <p class="daycount yellowtext anim" style="--dl: 0;">DAY 2</p>
    </div>
    <div id="day3" class="daycontainer">
        <p class="daycount greentext anim" style="--dl: 0;">DAY 3</p>
    </div>
    <div id="day4" class="daycontainer">
        <p class="daycount skytext anim" style="--dl: 0;">DAY 4</p>
    </div>
    <div id="day5" class="daycontainer">
        <p class="daycount bluetext anim" style="--dl: 0;">DAY 5</p>
    </div>
    <div id="day6" class="daycontainer">
        <p class="daycount purpletext anim" style="--dl: 0;">DAY 6</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
